<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<title>csv2xlsx - Dashboard</title>
	<style>
		:root {
			--bg-base: #f8f9fa;
			--bg-card: #ffffff;
			--border-card: rgba(0, 0, 0, 0.06);
			--text-primary: #1f2937;
			--text-secondary: #6b7280;
			--accent-green: #10b981;
			--accent-blue: #3b82f6;
			--accent-glow: rgba(16, 185, 129, 0.08);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			width: 320px;
			background: var(--bg-base);
			color: var(--text-primary);
			padding: 20px;
			overflow: hidden;
		}

		/* Glowing background effect */
		.glow-bg {
			position: absolute;
			top: -40px;
			left: -40px;
			width: 120px;
			height: 120px;
			background: radial-gradient(circle, var(--accent-glow) 0%, rgba(255, 255, 255, 0) 70%);
			pointer-events: none;
			z-index: 0;
		}

		.container {
			position: relative;
			z-index: 1;
		}

		.header {
			display: flex;
			align-items: center;
			gap: 12px;
			margin-bottom: 20px;
		}

		.logo-container {
			position: relative;
			width: 42px;
			height: 42px;
			background: linear-gradient(135deg, var(--accent-green) 0%, var(--accent-blue) 100%);
			border-radius: 12px;
			display: flex;
			align-items: center;
			justify-content: center;
			box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
		}

		.logo-icon {
			color: #ffffff;
			font-size: 22px;
			font-weight: 700;
		}

		.header-title-container h1 {
			font-size: 18px;
			font-weight: 700;
			letter-spacing: -0.5px;
			color: var(--text-primary);
		}

		.header-title-container p {
			font-size: 11px;
			color: var(--accent-green);
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 1px;
			margin-top: 1px;
		}

		/* Status Card */
		.status-card {
			background: var(--bg-card);
			border: 1px solid var(--border-card);
			border-radius: 16px;
			padding: 16px;
			margin-bottom: 20px;
			display: flex;
			align-items: center;
			gap: 12px;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
		}

		.pulse-dot {
			width: 8px;
			height: 8px;
			background-color: var(--accent-green);
			border-radius: 50%;
			box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
			animation: pulse 1.6s infinite;
		}

		@keyframes pulse {
			0% {
				transform: scale(0.95);
				box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
			}

			70% {
				transform: scale(1);
				box-shadow: 0 0 0 8px rgba(16, 185, 129, 0);
			}

			100% {
				transform: scale(0.95);
				box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
			}
		}

		.status-text h2 {
			font-size: 13px;
			font-weight: 600;
			color: var(--text-primary);
		}

		.status-text p {
			font-size: 11px;
			color: var(--text-secondary);
			margin-top: 2px;
		}

		/* Link list */
		.links-section {
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.links-section h3 {
			font-size: 11px;
			font-weight: 700;
			text-transform: uppercase;
			color: var(--text-secondary);
			letter-spacing: 1px;
			margin-bottom: 4px;
			padding-left: 4px;
		}

		.action-link {
			display: flex;
			align-items: center;
			justify-content: space-between;
			background: var(--bg-card);
			border: 1px solid var(--border-card);
			border-radius: 12px;
			padding: 12px 16px;
			text-decoration: none;
			color: var(--text-primary);
			font-size: 13px;
			font-weight: 500;
			transition: all 0.2s ease-in-out;
			cursor: pointer;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
		}

		.action-link:hover {
			background: #fdfdfd;
			border-color: rgba(16, 185, 129, 0.3);
			transform: translateY(-2px);
			box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
		}

		.action-link:active {
			transform: translateY(0);
		}

		.link-left {
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.link-icon {
			font-size: 16px;
		}

		.link-arrow {
			font-size: 11px;
			color: var(--text-secondary);
			transition: transform 0.2s ease;
		}

		.action-link:hover .link-arrow {
			transform: translateX(3px);
			color: var(--accent-green);
		}

		/* Footer */
		.footer {
			margin-top: 24px;
			text-align: center;
			font-size: 10px;
			color: var(--text-secondary);
			letter-spacing: 0.5px;
		}
	</style>
</head>

<body>
	<div class="glow-bg"></div>
	<div class="container">
		<div class="header">
			<div class="logo-container">
				<span class="logo-icon">田</span>
			</div>
			<div class="header-title-container">
				<h1>csv2xlsx</h1>
				<p>Active Engine</p>
			</div>
		</div>

		<div class="status-card">
			<div class="pulse-dot"></div>
			<div class="status-text">
				<h2>Real-time Converter</h2>
				<p>Listening for CSV downloads</p>
			</div>
		</div>

		<div class="links-section">
			<h3>Quick Links</h3>
			<a class="action-link" href="https://github.com/csv2xlsx">
				<div class="link-left">
					<span class="link-icon">📖</span>
					<span>Documentation</span>
				</div>
				<span class="link-arrow">➜</span>
			</a>
			<a class="action-link" href="https://github.com/csv2xlsx/issues">
				<div class="link-left">
					<span class="link-icon">💬</span>
					<span>Support & Issues</span>
				</div>
				<span class="link-arrow">➜</span>
			</a>
		</div>

		<div class="footer">
			csv2xlsx v0.11.0
		</div>
	</div>

	<script src="popup.js"></script>
</body>

</html>
